# ──────────────────────────────────────────────────────────────────────────────
# FControl – Configurações da Aplicação (Versão Desktop Standalone)
# ──────────────────────────────────────────────────────────────────────────────

spring.application.name=fcontrol

# ── H2 Database (Banco Local Embutido) ────────────────────────────────────────
# O banco de dados será salvo na pasta pessoal do usuário (ex: C:\Users\Nome\.fcontrol no Windows ou ~/.fcontrol no Linux)
# Isso garante que se o usuário reinstalar ou mover o app, os dados continuam salvos lá.
spring.datasource.url=jdbc:h2:file:${user.home}/.fcontrol/data;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar console H2 (se precisar acessar manualmente depois)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8085
