name: Git Flow Automation

on:
  push:
    branches:
      - "feat/*"
      - develop
      - release

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Calculate destination branch
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == feat/* || "${{ github.ref_name }}" == feature/* ]]; then
            echo "dest=develop" >> $GITHUB_OUTPUT
            echo "title=🛠️ [Auto-PR] Feature -> Develop" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "dest=release" >> $GITHUB_OUTPUT
            echo "title=🔄 [Auto-PR] Develop -> Release (Homologação)" >> $GITHUB_OUTPUT
          else
            echo "dest=main" >> $GITHUB_OUTPUT
            echo "title=🚀 [Auto-PR] Release -> Main (Produção)" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-pr-${{ github.ref_name }}-to-${{ steps.vars.outputs.dest }}
          base: ${{ steps.vars.outputs.dest }}
          title: ${{ steps.vars.outputs.title }}
          body: |
            Este é um Pull Request automático gerado pelo fluxo Git Flow.

            - **Origem:** `${{ github.ref_name }}`
            - **Destino:** `${{ steps.vars.outputs.dest }}`

            Por favor, valide as alterações e realize os testes de homologação antes do merge.
          labels: |
            automated-pr
            git-flow
