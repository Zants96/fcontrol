name: Git Flow Automation

on:
  push:
    branches:
      - "feat/*"
      - "feature/*"
      - develop
      - release
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Calculate destination branch
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == feat/* || "${{ github.ref_name }}" == feature/* ]]; then
            echo "dest=develop" >> $GITHUB_OUTPUT
            echo "title=🛠️ [Auto-PR] Feature -> Develop" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "dest=release" >> $GITHUB_OUTPUT
            echo "title=🔄 [Auto-PR] Develop -> Release (Homologação)" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "release" ]]; then
            echo "dest=main" >> $GITHUB_OUTPUT
            echo "title=🚀 [Auto-PR] Release -> Main (Produção)" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request via API
        if: steps.vars.outputs.dest != ''
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.ref.replace('refs/heads/', '');
            const base = '${{ steps.vars.outputs.dest }}';
            const title = '${{ steps.vars.outputs.title }}';
            
            // Verifica se o PR já existe
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${head}`,
              base: base,
              state: 'open'
            });
            
            if (pulls.length > 0) {
              console.log(`PR já existe: ${pulls[0].html_url}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                head: head,
                base: base,
                body: `Este é um Pull Request automático gerado pelo fluxo Git Flow.\n\n- **Origem:** ${head}\n- **Destino:** ${base}\n\nPor favor, valide as alterações antes do merge.`
              });
              console.log(`PR criado com sucesso: ${pr.html_url}`);
            }
