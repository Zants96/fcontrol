name: Build and Release Multi-Platform Installers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  version:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_action.outputs.new_tag }}
      clean_version: ${{ steps.tag_action.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Bump version and push tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: always() && (needs.version.result == 'success' || (github.event_name == 'workflow_dispatch' && needs.version.result == 'skipped'))
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: Windows-EXE
            type: exe
          - os: ubuntu-latest
            target: Linux-DEB
            type: deb
          - os: ubuntu-latest
            target: Linux-RPM
            type: rpm
          - os: macos-latest
            target: macOS-DMG
            type: dmg

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm fakeroot

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Create Custom JRE (jlink)
      shell: bash
      run: |
        mkdir -p target/jpackage-input
        cp target/fcontrol-*.jar target/jpackage-input/
        $JAVA_HOME/bin/jlink --add-modules java.se,jdk.unsupported,java.management,java.desktop,java.naming,java.sql,java.net.http,java.instrument,java.rmi,java.security.jgss,jdk.crypto.ec,jdk.charsets,jdk.localedata,java.xml,java.management.rmi,jdk.jsobject,jdk.xml.dom,jdk.zipfs,jdk.crypto.cryptoki,jdk.naming.dns --output target/custom-jre --no-header-files --no-man-pages

    - name: Run jpackage
      shell: bash
      run: |
        # Configurar ícone baseado na plataforma
        ICON="src/main/resources/static/icon.png"
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          ICON="src/main/resources/static/icon.ico"
        fi

        # Comando base do jpackage usando a versão calculada ou fallback (numérico para evitar erros no macOS)
        VERSION=${{ needs.version.outputs.clean_version }}
        if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi

        $JAVA_HOME/bin/jpackage \
          --input target/jpackage-input \
          --name "FControl" \
          --main-jar "fcontrol-0.0.1-SNAPSHOT.jar" \
          --type ${{ matrix.type }} \
          --dest release \
          --app-version "$VERSION" \
          --description "FControl - Gerenciamento Financeiro" \
          --vendor "Leandro Jose Lesnik" \
          --icon "$ICON" \
          --runtime-image target/custom-jre \
          $( [ "${{ matrix.os }}" == "windows-latest" ] && echo "--win-shortcut --win-menu --win-dir-chooser" ) \
          $( [ "${{ matrix.os }}" == "ubuntu-latest" ] && echo "--linux-shortcut --linux-package-name fcontrol --linux-menu-group Office;Finance;" )

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcontrol-${{ matrix.target }}
        path: release/*

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
