name: Build Multi-Platform Installers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: FControl-Linux
            installer_ext: "*.deb"
          - os: windows-latest
            artifact_name: FControl-Windows
            installer_ext: "*.exe"
          - os: macos-latest
            artifact_name: FControl-macOS
            installer_ext: "*.dmg"

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Create JRE Customizado (jlink)
      shell: bash
      run: |
        mkdir -p target/jpackage-input
        cp target/fcontrol-*.jar target/jpackage-input/
        $JAVA_HOME/bin/jlink --add-modules java.se,jdk.unsupported,java.management,java.desktop,java.naming,java.sql,java.net.http,java.instrument,java.rmi,java.security.jgss,jdk.crypto.ec,jdk.charsets,jdk.localedata,java.xml,java.management.rmi,jdk.jsobject,jdk.xml.dom,jdk.zipfs,jdk.crypto.cryptoki,jdk.naming.dns --output target/custom-jre --no-header-files --no-man-pages

    - name: Package Windows Installer
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        $JAVA_HOME/bin/jpackage \
          --input target/jpackage-input \
          --name "FControl" \
          --main-jar "fcontrol-0.0.1-SNAPSHOT.jar" \
          --type exe \
          --dest release \
          --app-version 1.0.0 \
          --description "FControl - Controle Financeiro" \
          --vendor "Leandro Jose Lesnik" \
          --icon "src/main/resources/static/icon.ico" \
          --win-shortcut \
          --win-menu \
          --win-dir-chooser \
          --runtime-image target/custom-jre

    - name: Package Linux Installer (DEB)
      if: matrix.os == 'ubuntu-latest'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input target/jpackage-input \
          --name "FControl" \
          --main-jar "fcontrol-0.0.1-SNAPSHOT.jar" \
          --type deb \
          --dest release \
          --app-version 1.0.0 \
          --description "FControl - Gerenciamento Financeiro Pessoal" \
          --vendor "Leandro Jose Lesnik" \
          --icon "src/main/resources/static/icon.png" \
          --linux-shortcut \
          --linux-package-name "fcontrol" \
          --linux-menu-group "Office;Finance;" \
          --runtime-image target/custom-jre

    - name: Package Linux Installer (RPM)
      if: matrix.os == 'ubuntu-latest'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input target/jpackage-input \
          --name "FControl" \
          --main-jar "fcontrol-0.0.1-SNAPSHOT.jar" \
          --type rpm \
          --dest release \
          --app-version 1.0.0 \
          --description "FControl - Gerenciamento Financeiro Pessoal" \
          --vendor "Leandro Jose Lesnik" \
          --icon "src/main/resources/static/icon.png" \
          --linux-shortcut \
          --linux-package-name "fcontrol" \
          --linux-menu-group "Office;Finance;" \
          --runtime-image target/custom-jre

    - name: Package macOS Installer
      if: matrix.os == 'macos-latest'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input target/jpackage-input \
          --name "FControl" \
          --main-jar "fcontrol-0.0.1-SNAPSHOT.jar" \
          --type dmg \
          --dest release \
          --app-version 1.0.0 \
          --description "FControl - Financial Control" \
          --vendor "Leandro Jose Lesnik" \
          --icon "src/main/resources/static/icon.png" \
          --runtime-image target/custom-jre

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release/*
